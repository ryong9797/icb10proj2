name: Daily Dashboard Data Update

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 설치하기
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필요한 프로그램 싹 다 설치
      run: |
        pip install pandas requests beautifulsoup4 lxml scikit-learn matplotlib

    - name: 🐍 파이썬 스크립트 강제 실행
      run: |
        # 창고 안의 모든 .py 파일을 찾아서 실행합니다
        find . -maxdepth 2 -name "*.py" -exec python {} \;

    - name: 💾 결과 저장
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        git commit -m "데이터 업데이트" || exit 0
        git push
