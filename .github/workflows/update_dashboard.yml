name: Daily Dashboard Data Update

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 설치하기
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필요한 프로그램 싹 다 설치
      run: |
        pip install pandas requests beautifulsoup4 lxml scikit-learn

    - name: 숨어있는 메인 파일까지 싹 다 찾아서 실행하기
      run: |
        # 1. 바깥에 있는 핵심 메인 스크립트 실행!
        if [ -f "eda_script.py" ]; then python eda_script.py || true; fi
        
        # 2. weather-data 폴더 안의 스크립트도 실행!
        if [ -d "weather-data" ]; then
          cd weather-data
          mkdir -p report/api
          for file in *.py; do
            if [ -f "$file" ]; then python "$file" || true; fi
          done
          cd ..
        fi

    - name: 새로 생긴 파일 무조건 깃허브에 강제 저장
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # json이든 뭐든 새로 만들어진 건 싹 다 주워 담습니다!
        git add -A  
        git commit -m "데이터 최종 수집 완료 및 강제 업로드" || exit 0
        git push
