name: Daily Dashboard Data Update

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 설치하기
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필요한 프로그램 설치
      run: |
        pip install pandas requests beautifulsoup4 lxml scikit-learn

    - name: 파이썬 스크립트 실행 (미리 빈 폴더 만들고 실행)
      run: |
        cd "weather-data"
        mkdir -p report/api   # ⬅️ 여기가 핵심입니다! 에러가 나지 않도록 api 폴더를 미리 만들어줍니다.
        for file in *.py; do
          python "$file"
        done

    - name: 만들어진 데이터(JSON) 강제로 깃허브에 올리기
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        find . -name "*.json" -exec git add -f {} + || true
        git commit -m "최신 가격 데이터 업데이트 성공" || exit 0
        git push
