name: Daily Dashboard Data Update

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 설치하기
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필요한 프로그램 싹 다 설치
      run: |
        pip install pandas requests beautifulsoup4 lxml scikit-learn

    - name: 🐍 파이썬 스크립트 정직하게 실행 (에러 숨김 금지!)
      run: |
        if [ -f "eda_script.py" ]; then python eda_script.py; fi
        
        if [ -d "weather-data" ]; then
          cd weather-data
          mkdir -p report/api
          for file in *.py; do
            if [ -f "$file" ]; then python "$file"; fi
          done
        fi

    - name: 💾 만들어진 파일 깃허브에 저장
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        find . -name "*.json" -exec git add -f {} + || true
        git add -A
        git commit -m "챗봇용 데이터 업데이트" || exit 0
        git push
