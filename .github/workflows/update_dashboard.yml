name: Daily Dashboard Data Update

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 설치
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필수 부품 설치
      run: pip install pandas requests beautifulsoup4 lxml scikit-learn matplotlib

    - name: 스크립트 실행 및 결과 확인
      run: |
        cd weather-data
        python analyze_error.py
        python export_static.py
        echo "--- 현재 폴더의 모든 파일 목록 ---"
        find . -maxdepth 3
