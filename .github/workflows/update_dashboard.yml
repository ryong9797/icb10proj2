name: Daily Dashboard Data Update
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - run: pip install pandas requests beautifulsoup4 lxml scikit-learn matplotlib
    - run: |
        cd weather-data
        python export_static.py || true
        # 결과물이 report 폴더 근처에 생겼을 테니 다 긁어모읍니다.
        cp -r report ../
    - name: 결과물 저장
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add report/
        git commit -m "데이터 파일 강제 보관" || exit 0
        git push
